<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Playfair+Display:ital,wght@0,300;0,600;1,300&display=swap"
          rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d161a;
            --surface: #1a1916;
            --border: #2e2c28;
            --text: #e8e4dc;
            --muted: #6b6760;
            --accent: #269ec9;
            --accent-dim: #1f80a3;
            --danger: #c96e6e;
            --hour-h: 60px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        /* HEADER */
        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 300;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
            color: var(--accent);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* VIEW TOGGLE */
        .view-toggle {
            display: flex;
            gap: 4px;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px;
        }

        .view-toggle button {
            background: none;
            border: none;
            color: var(--muted);
            padding: 5px 14px;
            border-radius: 3px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .view-toggle button.active {
            background: var(--accent);
            color: var(--bg);
        }

        .view-toggle button:not(.active):hover { color: var(--accent); }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-nav button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: border-color 0.15s, color 0.15s;
        }

        .date-nav button:hover { border-color: var(--accent); color: var(--accent); }

        #currentDateLabel {
            font-size: 0.85rem;
            color: var(--muted);
            min-width: 160px;
            text-align: center;
        }

        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.15s;
            font-weight: 500;
        }

        .btn:hover { opacity: 0.85; }

        .btn-ghost {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 18px;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        /* MAIN LAYOUT */
        main {
            display: grid;
            grid-template-columns: 1fr 320px;
            overflow: hidden;
            height: calc(100vh - 69px);
        }

        /* SCHEDULE WRAP */
        .schedule-wrap {
            overflow-y: auto;
            border-right: 1px solid var(--border);
            position: relative;
        }

        /* ── DAY VIEW ── */
        .schedule-grid {
            display: grid;
            grid-template-columns: 52px 1fr;
            min-height: 100%;
        }

        .time-col {
            border-right: 1px solid var(--border);
            position: relative;
        }

        .time-label {
            height: var(--hour-h);
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 6px 10px 0 0;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .events-col { position: relative; }

        .hour-line {
            height: var(--hour-h);
            border-top: 1px solid var(--border);
            position: relative;
        }

        .hour-line::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            border-top: 1px dashed #1f1e1b;
        }

        /* EVENT BLOCKS */
        .event-block {
            position: absolute;
            left: 4px;
            right: 4px;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.75rem;
            overflow: hidden;
            cursor: pointer;
            border-left: 3px solid;
            transition: filter 0.15s, transform 0.1s;
            z-index: 1;
        }

        .event-block:hover { filter: brightness(1.15); transform: translateX(1px); }

        .event-block .ev-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .event-block .ev-meta {
            color: rgba(255,255,255,0.6);
            font-size: 0.68rem;
        }

        /* NOW LINE */
        #nowLine {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            z-index: 10;
            pointer-events: none;
        }

        #nowLine::before {
            content: '';
            position: absolute;
            left: -4px;
            top: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* ── WEEK VIEW ── */
        .week-grid {
            display: grid;
            grid-template-columns: 52px repeat(7, 1fr);
            min-height: 100%;
        }

        .week-day-header {
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
            padding: 8px 4px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 5;
        }

        .week-day-header.today { color: var(--accent); }

        .header-stress {
            font-size: 0.62rem;
            opacity: 0.85;
            font-weight: 400;
        }

        .week-time-col { border-right: 1px solid var(--border); }
        .week-time-col .time-label { border-top: 1px solid var(--border); }

        .week-day-col {
            position: relative;
            border-right: 1px solid var(--border);
        }

        .week-hour-line {
            height: var(--hour-h);
            border-top: 1px solid var(--border);
            position: relative;
        }

        .week-hour-line::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            border-top: 1px dashed #1f1e1b;
        }

        /* ── MONTH VIEW ── */
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: minmax(100px, 1fr);
            min-height: 100%;
        }

        .month-dow-header {
            font-size: 0.68rem;
            color: var(--muted);
            text-align: center;
            padding: 10px 4px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 5;
        }

        .month-cell {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 6px;
            cursor: pointer;
            transition: background 0.12s;
            overflow: hidden;
        }

        .month-cell:hover { background: var(--surface); }
        .month-cell.other-month { opacity: 0.3; }

        .month-cell.today .month-day-num > span:first-child {
            background: var(--accent);
            color: var(--bg);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-day-num {
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 22px;
        }

        /* ADDED alongside it */
        .month-stress-label {
            font-size: 0.62rem;
            opacity: 0.9;
        }

        .month-event-pill {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            border-left: 2px solid;
        }

        .month-event-pill:hover { filter: brightness(1.2); }

        .month-more {
            font-size: 0.62rem;
            color: var(--muted);
            padding: 2px 0;
        }

        /* EMPTY STATE */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .empty-state p:first-child {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: var(--border);
        }

        /* SIDEBAR */
        .sidebar {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .event-form {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-size: 0.82rem;
            padding: 8px 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--accent); }

        .form-group textarea { resize: vertical; min-height: 70px; }

        .time-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* STRESS BUBBLES */
        .stress-row { display: flex; gap: 8px; }

        .stress-bubble {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            font-family: 'Roboto', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
        }

        .stress-bubble:hover { transform: scale(1.1); border-color: var(--muted); }

        .stress-bubble.selected[data-level="1"] { background: #4caf7d; border-color: #4caf7d; color: var(--bg); }
        .stress-bubble.selected[data-level="2"] { background: #8fbc4f; border-color: #8fbc4f; color: var(--bg); }
        .stress-bubble.selected[data-level="3"] { background: #c9c26e; border-color: #c9c26e; color: var(--bg); }
        .stress-bubble.selected[data-level="4"] { background: #c98f4f; border-color: #c98f4f; color: var(--bg); }
        .stress-bubble.selected[data-level="5"] { background: #c96e6e; border-color: #c96e6e; color: var(--bg); }

        .form-actions { display: flex; gap: 8px; padding-top: 4px; }
        .form-actions .btn { flex: 1; }

        #deleteBtn {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 14px;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        #deleteBtn:hover { background: rgba(201,110,110,0.1); }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* SEARCH */
        .search-wrap {
            position: relative;
        }

        #searchInput {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-size: 0.82rem;
            padding: 8px 12px;
            width: 220px;
            outline: none;
            transition: border-color 0.15s;
        }

        #searchInput:focus { border-color: var(--accent); }

        .search-results {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            z-index: 100;
            max-height: 260px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 10px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }

        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--bg); }
        .search-result-item .result-title { color: var(--text); margin-bottom: 2px; }
        .search-result-item .result-meta  { color: var(--muted); font-size: 0.7rem; }

        .search-no-results {
            padding: 12px 14px;
            font-size: 0.8rem;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>Schedule</h1>
    <div class="header-controls">
        <!-- View toggle -->
        <div class="view-toggle">
            <button id="btnDay" onclick="setView('day')">day</button>
            <button id="btnWeek" onclick="setView('week')">week</button>
            <button id="btnMonth" onclick="setView('month')">month</button>
        </div>

        <!-- Date navigation -->
        <div class="date-nav">
            <button onclick="changeDate(-1)">‹</button>
            <span id="currentDateLabel"></span>
            <button onclick="changeDate(1)">›</button>
        </div>

        <button class="btn-ghost" onclick="goToToday()">Today</button>
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="search events..." oninput="handleSearch(event)">
            <div id="searchResults" class="search-results" style="display:none"></div>
        </div>
        <button class="btn" onclick="newEvent()">+ New Event</button>
    </div>
</header>

<main>
    <!-- SCHEDULE AREA -->
    <div class="schedule-wrap" id="scheduleWrap"></div>

    <!-- SIDEBAR FORM -->
    <aside class="sidebar">
        <div class="sidebar-header" id="sidebarTitle">new event</div>
        <div class="event-form">
            <input type="hidden" id="eventId">

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="fTitle" placeholder="e.g. Team standup">
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="fDate">
            </div>

            <div class="time-row">
                <div class="form-group">
                    <label>Start</label>
                    <input type="time" id="fStart">
                </div>
                <div class="form-group">
                    <label>End</label>
                    <input type="time" id="fEnd">
                </div>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" id="fLocation" placeholder="e.g. Room 204">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="fDesc" placeholder="Optional notes..."></textarea>
            </div>

            <div class="form-group">
                <label>Stress Level</label>
                <div class="stress-row" id="fStress"></div>
            </div>

            <div class="form-actions">
                <button id="deleteBtn" style="display:none" onclick="deleteEvent()">Delete</button>
                <button class="btn" onclick="saveEvent()">Save Event</button>
            </div>
        </div>
    </aside>
</main>

<script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────────
    const API   = '/events';
    const HOURS = Array.from({length: 24}, (_, i) => i);
    const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const STRESS_COLORS = {
        1: '#4caf7d',
        2: '#8fbc4f',
        3: '#c9c26e',
        4: '#c98f4f',
        5: '#c96e6e'
    };

    let currentDate   = new Date();
    let currentView   = 'day';
    let editingId     = null;
    let selectedStress = 1;

    // ─── HELPERS ──────────────────────────────────────────────────────────────────
    function to12hr(time) {
        const [h, m] = time.split(':').map(Number);
        const ampm = h < 12 ? 'AM' : 'PM';
        const hour = h % 12 || 12;
        return `${hour}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    function toDateString(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function isToday(d) { return toDateString(d) === toDateString(new Date()); }

    function weekBounds(d) {
        const start = new Date(d);
        start.setDate(d.getDate() - d.getDay());
        const end = new Date(start);
        end.setDate(start.getDate() + 6);
        return {start, end};
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        buildStressBubbles();
        setFormDate(currentDate);
        setView('day');
        setInterval(updateNowLine, 60000);
    });

    // ─── VIEW SWITCHER ────────────────────────────────────────────────────────────
    function setView(view) {
        currentView = view;
        ['day','week','month'].forEach(v => {
            document.getElementById(`btn${cap(v)}`).classList.toggle('active', v === view);
        });
        renderDateLabel();
        if (view === 'day')   renderDayView();
        if (view === 'week')  renderWeekView();
        if (view === 'month') renderMonthView();
    }

    // ─── DATE ─────────────────────────────────────────────────────────────────────
    function renderDateLabel() {
        const el = document.getElementById('currentDateLabel');
        if (currentView === 'day') {
            el.textContent = currentDate.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
        } else if (currentView === 'week') {
            const {start, end} = weekBounds(currentDate);
            el.textContent = `${start.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
        } else {
            el.textContent = currentDate.toLocaleDateString('en-US', {month:'long', year:'numeric'});
        }
    }

    function changeDate(delta) {
        if (currentView === 'day')        currentDate.setDate(currentDate.getDate() + delta);
        else if (currentView === 'week')  currentDate.setDate(currentDate.getDate() + delta * 7);
        else                              currentDate.setMonth(currentDate.getMonth() + delta);
        setView(currentView);
    }

    function goToToday() {
        currentDate = new Date();
        setView(currentView);
    }

    // ─── API ──────────────────────────────────────────────────────────────────────
    async function fetchEvents(dateStr) {
        try {
            const res = await fetch(`${API}/date/${dateStr}`, {
                credentials: 'include'
            });
            if (!res.ok) return [];
            const data = await res.json();
            return Array.isArray(data) ? data : [];
        } catch { return []; }
    }

    // ─── STRESS HELPERS ───────────────────────────────────────────────────────────
    function avgStress(events) {
        if (!events.length) return null;
        const sum = events.reduce((acc, ev) => acc + (ev.stress || 0), 0);
        return sum / events.length; // double
    }

    function stressColor(avg) {
        if (avg === null) return null;
        if (avg <= 1.5) return STRESS_COLORS[1];
        if (avg <= 2.5) return STRESS_COLORS[2];
        if (avg <= 3.5) return STRESS_COLORS[3];
        if (avg <= 4.5) return STRESS_COLORS[4];
        return STRESS_COLORS[5];
    }

    // ─── DAY VIEW ─────────────────────────────────────────────────────────────────
    function renderDayView() {
        const wrap = document.getElementById('scheduleWrap');
        wrap.innerHTML = `
            <div class="schedule-grid">
                <div class="time-col" id="timeCol"></div>
                <div class="events-col" id="eventsCol">
                    <div id="nowLine" style="display:none"></div>
                    <div class="empty-state" id="emptyState">
                        <p>nothing scheduled</p>
                        <span>add an event to get started</span>
                    </div>
                </div>
            </div>`;

        buildDayGrid();
        loadDayEvents();
        updateNowLine();
    }

    function buildDayGrid() {
        const timeCol   = document.getElementById('timeCol');
        const eventsCol = document.getElementById('eventsCol');
        timeCol.innerHTML = '';
        eventsCol.querySelectorAll('.hour-line').forEach(el => el.remove());

        HOURS.forEach(h => {
            const label = document.createElement('div');
            label.className = 'time-label';
            label.textContent = h === 0 ? '' : to12hr(`${String(h).padStart(2,'0')}:00`).replace(':00','');
            timeCol.appendChild(label);

            const line = document.createElement('div');
            line.className = 'hour-line';
            eventsCol.appendChild(line);
        });
    }

    async function loadDayEvents() {
        const events = await fetchEvents(toDateString(currentDate));
        const emptyState = document.getElementById('emptyState');
        document.querySelectorAll('.event-block').forEach(el => el.remove());
        if (emptyState) emptyState.style.display = events.length === 0 ? 'block' : 'none';

        // Show daily avg stress above the grid
        let stressDisplay = document.getElementById('dayStressDisplay');
        if (!stressDisplay) {
            stressDisplay = document.createElement('div');
            stressDisplay.id = 'dayStressDisplay';
            stressDisplay.style.cssText = 'font-size:0.72rem;padding:6px 12px;text-align:right;letter-spacing:0.04em;position:sticky;top:0;z-index:4;background:var(--bg);border-bottom:1px solid var(--border);';
            document.getElementById('scheduleWrap').prepend(stressDisplay);
        }
        const avg   = avgStress(events);
        const color = stressColor(avg);
        if (avg !== null) {
            stressDisplay.textContent  = `Stress: ${avg.toFixed(2)}`;
            stressDisplay.style.color  = color;
        } else {
            stressDisplay.textContent = '';
        }

        const col = document.getElementById('eventsCol');
        events.forEach(ev => placeEventBlock(ev, col));
    }

    function placeEventBlock(ev, col) {
        const block = document.createElement('div');
        block.className = 'event-block';

        const color = STRESS_COLORS[ev.stress] || STRESS_COLORS[1];
        block.style.background      = color + '22';
        block.style.borderLeftColor = color;
        block.style.color           = color;

        const [sh, sm] = ev.startTime.split(':').map(Number);
        const [eh, em] = ev.endTime.split(':').map(Number);
        const startMin = sh * 60 + sm;
        const endMin   = eh * 60 + em;
        block.style.top    = `${(startMin / 60) * 60}px`;
        block.style.height = `${Math.max(((endMin - startMin) / 60) * 60, 24)}px`;

        block.innerHTML = `
            <div class="ev-title">${ev.title}</div>
            <div class="ev-meta">${to12hr(ev.startTime)} – ${to12hr(ev.endTime)}${ev.location ? ' · ' + ev.location : ''}</div>
            ${ev.stress ? `<div class="ev-meta">Stress: ${ev.stress}</div>` : ''}`;

        block.addEventListener('click', () => openEditForm(ev));
        col.appendChild(block);
    }

    function updateNowLine() {
        const line = document.getElementById('nowLine');
        if (!line) return;
        if (!isToday(currentDate) || currentView !== 'day') { line.style.display = 'none'; return; }
        const now = new Date();
        line.style.top = `${(now.getHours() * 60 + now.getMinutes()) / 60 * 60}px`;
        line.style.display = 'block';
    }

    // ─── WEEK VIEW ────────────────────────────────────────────────────────────────
    async function renderWeekView() {
        const {start} = weekBounds(currentDate);
        const days = Array.from({length: 7}, (_, i) => {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            return d;
        });

        const wrap = document.getElementById('scheduleWrap');
        wrap.innerHTML = '';

        // Fetch first so headers can be stress-colored immediately
        const allEvents = await Promise.all(days.map(d => fetchEvents(toDateString(d))));

        const grid = document.createElement('div');
        grid.className = 'week-grid';

        // Corner spacer
        const corner = document.createElement('div');
        corner.style.cssText = 'border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:6;';
        grid.appendChild(corner);

        // Day headers — colored by avg stress
        days.forEach((d, i) => {
            const avg   = avgStress(allEvents[i]);
            const color = stressColor(avg);
            const h = document.createElement('div');
            h.className = 'week-day-header' + (isToday(d) ? ' today' : '');
            h.innerHTML = `<span>${DAYS[d.getDay()]} ${d.getDate()}</span>${avg !== null ? `<span class="header-stress" style="color:${color}">&nbsp;· Stress: ${avg.toFixed(2)}</span>` : ''}`;
            if (color) {
                h.style.color           = color;
                h.style.borderBottom    = `2px solid ${color}`;
                h.style.backgroundColor = color + '18';
            }
            grid.appendChild(h);
        });

        // Time column
        const timeCol = document.createElement('div');
        timeCol.className = 'week-time-col';
        HOURS.forEach(h => {
            const lbl = document.createElement('div');
            lbl.className = 'time-label';
            lbl.textContent = h === 0 ? '' : to12hr(`${String(h).padStart(2,'0')}:00`).replace(':00','');
            timeCol.appendChild(lbl);
        });
        grid.appendChild(timeCol);

        // Day columns — subtle bg tint from avg stress
        const dayCols = days.map((d, i) => {
            const avg   = avgStress(allEvents[i]);
            const color = stressColor(avg);
            const col = document.createElement('div');
            col.className = 'week-day-col';
            if (color) col.style.backgroundColor = color + '08';
            HOURS.forEach(() => {
                const line = document.createElement('div');
                line.className = 'week-hour-line';
                col.appendChild(line);
            });
            grid.appendChild(col);
            return col;
        });

        wrap.appendChild(grid);

        allEvents.forEach((events, i) => events.forEach(ev => placeEventBlock(ev, dayCols[i])));
    }

    // ─── MONTH VIEW ───────────────────────────────────────────────────────────────
    async function renderMonthView() {
        const wrap = document.getElementById('scheduleWrap');
        wrap.innerHTML = '';

        const year        = currentDate.getFullYear();
        const month       = currentDate.getMonth();
        const firstDow    = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrev  = new Date(year, month, 0).getDate();

        const grid = document.createElement('div');
        grid.className = 'month-grid';

        DAYS.forEach(d => {
            const h = document.createElement('div');
            h.className = 'month-dow-header';
            h.textContent = d;
            grid.appendChild(h);
        });

        const cells = [];
        for (let i = firstDow - 1; i >= 0; i--)
            cells.push({date: new Date(year, month - 1, daysInPrev - i), otherMonth: true});
        for (let d = 1; d <= daysInMonth; d++)
            cells.push({date: new Date(year, month, d), otherMonth: false});
        const remaining = 7 - (cells.length % 7);
        if (remaining < 7)
            for (let d = 1; d <= remaining; d++)
                cells.push({date: new Date(year, month + 1, d), otherMonth: true});

        // Fetch all dates in parallel
        const uniqueDates = [...new Set(cells.map(c => toDateString(c.date)))];
        const eventMap = {};
        await Promise.all(uniqueDates.map(async ds => { eventMap[ds] = await fetchEvents(ds); }));

        cells.forEach(({date, otherMonth}) => {
            const cell = document.createElement('div');
            cell.className = 'month-cell' + (otherMonth ? ' other-month' : '') + (isToday(date) ? ' today' : '');

            const dayEvents = eventMap[toDateString(date)] || [];

            // Color entire cell by avg stress
            if (!otherMonth) {
                const avg   = avgStress(dayEvents);
                const color = stressColor(avg);
                if (color) {
                    cell.style.backgroundColor = color + '22';
                    cell.style.borderColor     = color + '55';
                }
                if (avg !== null) cell.title = `Avg stress: ${avg.toFixed(2)}`;
            }

            const numEl = document.createElement('div');
            numEl.className = 'month-day-num';
            if (!otherMonth && avgStress(dayEvents) !== null) {
                const avg   = avgStress(dayEvents);
                const color = stressColor(avg);
                numEl.innerHTML = `<span>${date.getDate()}</span><span class="month-stress-label" style="color:${color}">Stress: ${avg.toFixed(2)}</span>`;
            } else {
                numEl.textContent = date.getDate();
            }
            cell.appendChild(numEl);
            const maxShow = 3;

            dayEvents.slice(0, maxShow).forEach(ev => {
                const pill = document.createElement('div');
                pill.className = 'month-event-pill';
                const color = STRESS_COLORS[ev.stress] || STRESS_COLORS[1];
                pill.style.background      = color + '22';
                pill.style.borderLeftColor = color;
                pill.style.color           = color;
                pill.textContent = ev.title;
                pill.addEventListener('click', e => { e.stopPropagation(); openEditForm(ev); });
                cell.appendChild(pill);
            });

            if (dayEvents.length > maxShow) {
                const more = document.createElement('div');
                more.className = 'month-more';
                more.textContent = `+${dayEvents.length - maxShow} more`;
                cell.appendChild(more);
            }

            cell.addEventListener('click', () => {
                currentDate = new Date(date);
                setView('day');
            });

            grid.appendChild(cell);
        });

        wrap.appendChild(grid);
    }

    // ─── FORM ─────────────────────────────────────────────────────────────────────
    function newEvent() {
        editingId = null;
        document.getElementById('fTitle').value    = '';
        document.getElementById('fLocation').value = '';
        document.getElementById('fDesc').value     = '';
        document.getElementById('fStart').value    = '';
        document.getElementById('fEnd').value      = '';
        setFormDate(currentDate);
        selectStress(1);
        document.getElementById('sidebarTitle').textContent = 'new event';
        document.getElementById('deleteBtn').style.display  = 'none';
    }

    function openEditForm(ev) {
        editingId = ev.id;
        document.getElementById('fTitle').value    = ev.title       || '';
        document.getElementById('fDate').value     = ev.date        || '';
        document.getElementById('fStart').value    = ev.startTime ? ev.startTime.slice(0,5) : '';
        document.getElementById('fEnd').value      = ev.endTime   ? ev.endTime.slice(0,5)   : '';
        document.getElementById('fLocation').value = ev.location    || '';
        document.getElementById('fDesc').value     = ev.description || '';
        selectStress(ev.stress || 1);
        document.getElementById('sidebarTitle').textContent        = 'edit event';
        document.getElementById('deleteBtn').style.display         = 'inline-block';
    }

    function setFormDate(d) {
        document.getElementById('fDate').value = toDateString(d);
    }

    async function saveEvent() {
        const payload = {
            title:       document.getElementById('fTitle').value.trim(),
            date:        document.getElementById('fDate').value,
            startTime:   document.getElementById('fStart').value,
            endTime:     document.getElementById('fEnd').value,
            location:    document.getElementById('fLocation').value.trim(),
            description: document.getElementById('fDesc').value.trim(),
            stress:      selectedStress
        };

        if (!payload.title || !payload.date || !payload.startTime || !payload.endTime) {
            alert('Please fill in title, date, start and end time.');
            return;
        }

        try {
            const url    = editingId ? `${API}/${editingId}` : API;
            const method = editingId ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                credentials: 'include',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error('Save failed');
            newEvent();
            setView(currentView);
        } catch (e) {
            alert('Could not save event. Is the backend running?');
            console.error(e);
        }
    }

    async function deleteEvent() {
        if (!editingId) return;
        if (!confirm('Delete this event?')) return;
        try {
            await fetch(`${API}/${editingId}`, {method: 'DELETE', credentials: 'include'});
            newEvent();
            setView(currentView);
        } catch { alert('Could not delete event.'); }
    }

    // ─── STRESS BUBBLES ───────────────────────────────────────────────────────────
    function buildStressBubbles() {
        const row = document.getElementById('fStress');
        for (let i = 1; i <= 5; i++) {
            const b = document.createElement('div');
            b.className = 'stress-bubble';
            b.dataset.level = i;
            b.textContent = i;
            b.addEventListener('click', () => selectStress(i));
            row.appendChild(b);
        }
        selectStress(1);
    }

    function selectStress(level) {
        selectedStress = level;
        document.querySelectorAll('.stress-bubble').forEach(b => {
            b.classList.toggle('selected', parseInt(b.dataset.level) === level);
        });
    }

    // ─── SEARCH ───────────────────────────────────────────────────────────────────
    let searchTimeout = null;

    async function handleSearch(e) {
        const query = e.target.value.trim();
        const resultsBox = document.getElementById('searchResults');

        if (!query) {
            resultsBox.style.display = 'none';
            resultsBox.innerHTML = '';
            return;
        }

        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            try {
                const res = await fetch(`${API}/search?title=${encodeURIComponent(query)}`, {
                    credentials: 'include'
                });
                const events = await res.json();
                renderSearchResults(events, resultsBox);
            } catch (e) {
                console.error('Search failed:', e);
            }
        }, 300);
    }

    function renderSearchResults(events, box) {
        box.innerHTML = '';
        box.style.display = 'block';

        if (!events.length) {
            box.innerHTML = '<div class="search-no-results">no events found</div>';
            return;
        }

        events.forEach(ev => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            item.innerHTML = `
                <div class="result-title">${ev.title}</div>
                <div class="result-meta">${ev.date} · ${to12hr(ev.startTime)} – ${to12hr(ev.endTime)}</div>
            `;
            item.addEventListener('click', () => {
                const localDateString = ev.date.replace(/-/g, '\/');
                currentDate = new Date(localDateString);
                setView('day');
                openEditForm(ev);
                box.style.display = 'none';
                document.getElementById('searchInput').value = '';
            });
            box.appendChild(item);
        });
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrap')) {
            document.getElementById('searchResults').style.display = 'none';
        }
    });

</script>


</script>
